[theme]
primaryColor = "#10a396"
backgroundColor = "#0a0f0d"
secondaryBackgroundColor = "#141a17"
textColor = "#d8d8d8"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[logger]
level = "error"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false
